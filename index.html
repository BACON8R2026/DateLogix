<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DateLogix</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #111; color: white; }
#header { background: #8B0000; padding: 14px; text-align: center; font-size: 20px; font-weight: bold; }
table { width: 100%; border-collapse: collapse; background: #6a0000; }
table td { width: 25%; text-align: center; }
table td button { width: 100%; padding: 12px 0; background: #6a0000; color: rgba(255,255,255,0.6); border: none; border-bottom: 3px solid transparent; font-size: 13px; font-weight: bold; cursor: pointer; }
table td button.on { background: #8B0000; color: white; border-bottom: 3px solid white; }
#wrap { padding: 14px; }
.box { background: #1e1e1e; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.box h2 { font-size: 15px; margin-bottom: 14px; }
label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; margin-top: 10px; }
input[type=text], input[type=number], input[type=password], input[type=tel], textarea, select { display: block; width: 100%; padding: 10px; background: #141414; border: 1px solid #444; border-radius: 8px; color: white; font-size: 14px; -webkit-appearance: none; box-sizing: border-box; }
textarea { min-height: 80px; font-family: sans-serif; }
input[type=file] { display: none; }
.upbox { border: 2px dashed #8B0000; border-radius: 8px; padding: 20px; text-align: center; background: #1a0000; margin: 10px 0; color: #aaa; font-size: 14px; cursor: pointer; }
button.red { display: block; width: 100%; padding: 13px; margin-top: 12px; background: #8B0000; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
button.gray { display: block; width: 100%; padding: 13px; margin-top: 12px; background: #333; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
button.danger { display: block; width: 100%; padding: 13px; margin-top: 12px; background: transparent; color: #ff4444; border: 1px solid #ff4444; border-radius: 8px; font-size: 15px; cursor: pointer; }
.st { display: none; padding: 10px; border-radius: 6px; margin-top: 8px; font-size: 13px; text-align: center; }
.st.load { display: block; background: #2a1a00; color: orange; }
.st.ok { display: block; background: #003300; color: #4caf50; }
.st.err { display: block; background: #330000; color: #ff5555; }
.pcard { background: #1e1e1e; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
.pphoto { width: 100%; height: 240px; background: #2a2a2a; text-align: center; line-height: 240px; font-size: 48px; overflow: hidden; }
.pphoto img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pinfo { padding: 14px; }
.pname { font-size: 22px; font-weight: bold; }
.page { font-size: 14px; color: #aaa; margin-left: 6px; }
.ploc { color: #777; font-size: 13px; margin: 6px 0; }
.pbio { color: #bbb; font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
.remtag { display: inline-block; background: #2a0000; border: 1px solid #8B0000; color: #ff8888; font-size: 11px; border-radius: 20px; padding: 3px 9px; margin: 2px; }
.msglist { background: #141414; border-radius: 8px; padding: 10px; max-height: 160px; overflow-y: auto; margin: 8px 0; }
.msender { font-size: 10px; font-weight: bold; color: #8B0000; }
.mtext { font-size: 13px; color: #ccc; margin-bottom: 6px; }
textarea.notes { display: block; width: 100%; padding: 10px; background: #141414; border: 1px solid #333; border-radius: 8px; color: white; font-size: 13px; min-height: 70px; margin: 8px 0; box-sizing: border-box; font-family: sans-serif; }
.empty { text-align: center; padding: 60px 20px; color: #555; }
.empty h2 { color: #888; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="header">DATELOGIX</div>

<table><tr>
  <td><button id="t0" onclick="go(0)">Profiles</button></td>
  <td><button id="t1" onclick="go(1)">Add</button></td>
  <td><button id="t2" onclick="go(2)">Messages</button></td>
  <td><button id="t3" onclick="go(3)">Settings</button></td>
</tr></table>

<div id="wrap">

  <div id="p0">
    <div id="grid"></div>
    <div id="empty" class="empty"><h2>No profiles yet</h2><p>Tap Add to get started</p></div>
  </div>

  <div id="p1">
    <div class="box">
      <h2>Scan Tinder Screenshot</h2>
      <label for="ocrFile"><div class="upbox">Tap to upload a Tinder screenshot<br><small style="color:#555;">Auto-fills name, age, location, bio</small></div></label>
      <input type="file" id="ocrFile" accept="image/*" onchange="doOcr(this)">
      <div class="st" id="ocrSt"></div>
    </div>
    <div class="box">
      <h2>Profile Details</h2>
      <label for="pFile"><div class="upbox">Choose Photo</div></label>
      <input type="file" id="pFile" accept="image/*" onchange="prevPic(this)">
      <div id="picPrev" style="width:100%;height:120px;background:#141414;border-radius:8px;overflow:hidden;text-align:center;line-height:120px;color:#555;margin-bottom:8px;">No photo</div>
      <label>Name</label><input type="text" id="iName" placeholder="Her name">
      <label>Age</label><input type="number" id="iAge" placeholder="Age">
      <label>Location</label><input type="text" id="iLoc" placeholder="City, State">
      <label>Bio</label><textarea id="iBio" placeholder="What you know about her..."></textarea>
      <button class="red" onclick="addP()">Add Profile</button>
    </div>
  </div>

  <div id="p2">
    <div class="box">
      <h2>Conversation Screenshot</h2>
      <label>Profile</label>
      <select id="sMsgP"><option value="">-- Choose profile --</option></select>
      <label for="cFile"><div class="upbox">Tap to upload conversation screenshot</div></label>
      <input type="file" id="cFile" accept="image/*" onchange="doConv(this)">
      <div class="st" id="cSt"></div>
    </div>
    <div class="box">
      <h2>Quo SMS Sync</h2>
      <label>Profile</label>
      <select id="sQuoP"><option value="">-- Choose profile --</option></select>
      <p style="color:#666;font-size:12px;margin-top:8px;">Requires Quo API key and phone in Settings.</p>
      <button class="gray" onclick="doQuo()">Sync Quo Messages</button>
      <div class="st" id="qSt"></div>
    </div>
  </div>

  <div id="p3">
    <div class="box">
      <h2>AI / OCR</h2>
      <label>Anthropic API Key</label>
      <input type="password" id="sAK" placeholder="sk-ant-...">
      <p style="color:#555;font-size:11px;margin-top:4px;">Required for screenshot scanning</p>
    </div>
    <div class="box">
      <h2>Quo</h2>
      <label>Quo API Key</label><input type="password" id="sQK" placeholder="Your Quo API key">
      <label>Quo Phone Number</label><input type="tel" id="sQP" placeholder="+1 555 000 0000">
    </div>
    <div class="box">
      <button class="red" onclick="saveSt()">Save Settings</button>
      <button class="danger" onclick="clearAll()">Clear All Data</button>
    </div>
  </div>

</div>

<script>
var profiles = [];
var current = 1;

function go(n) {
    var i;
    for (i = 0; i < 4; i++) {
        document.getElementById('p' + i).style.display = 'none';
        document.getElementById('t' + i).className = '';
    }
    document.getElementById('p' + n).style.display = 'block';
    document.getElementById('t' + n).className = 'on';
    current = n;
    if (n === 2) { fillSel(); }
}

function boot() {
    go(1);
    var s = localStorage.getItem('dlP');
    if (s) { try { profiles = JSON.parse(s); } catch(e) { profiles = []; } }
    document.getElementById('sAK').value = localStorage.getItem('dlAK') || '';
    document.getElementById('sQK').value = localStorage.getItem('dlQK') || '';
    document.getElementById('sQP').value = localStorage.getItem('dlQP') || '';
    render();
    fillSel();
}

function sp() { localStorage.setItem('dlP', JSON.stringify(profiles)); }

function prevPic(inp) {
    if (!inp.files || !inp.files[0]) return;
    var r = new FileReader();
    r.onload = function(e) {
        document.getElementById('picPrev').innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;display:block;">';
    };
    r.readAsDataURL(inp.files[0]);
}

function doOcr(inp) {
    if (!inp.files || !inp.files[0]) return;
    var key = localStorage.getItem('dlAK') || '';
    if (!key) { alert('Go to Settings and add your Anthropic API key first.'); return; }
    st('ocrSt', 'load', 'Reading screenshot...');
    var r = new FileReader();
    r.onload = function(e) {
        var b64 = e.target.result.split(',')[1];
        var mime = inp.files[0].type || 'image/jpeg';
        ai(key, b64, mime, 'This is a Tinder profile screenshot. Return ONLY raw JSON, no markdown: {"name":"","age":"","location":"","bio":""}', function(res) {
            if (res.err) { st('ocrSt', 'err', 'Error: ' + res.err); return; }
            var d = {};
            try { d = JSON.parse(res.txt.replace(/```json/g,'').replace(/```/g,'').trim()); } catch(e) {}
            if (d.name) document.getElementById('iName').value = d.name;
            if (d.age) document.getElementById('iAge').value = d.age;
            if (d.location) document.getElementById('iLoc').value = d.location;
            if (d.bio) document.getElementById('iBio').value = d.bio;
            st('ocrSt', 'ok', 'Done! Review and tap Add Profile.');
        });
    };
    r.readAsDataURL(inp.files[0]);
}

function doConv(inp) {
    if (!inp.files || !inp.files[0]) return;
    var pid = document.getElementById('sMsgP').value;
    if (!pid) { alert('Select a profile first.'); return; }
    var key = localStorage.getItem('dlAK') || '';
    if (!key) { alert('Add Anthropic API key in Settings.'); return; }
    st('cSt', 'load', 'Reading...');
    var r = new FileReader();
    r.onload = function(e) {
        var b64 = e.target.result.split(',')[1];
        var mime = inp.files[0].type || 'image/jpeg';
        ai(key, b64, mime, 'Text message screenshot. Return ONLY raw JSON array: [{"sender":"Me or Her","text":"","date":""}]', function(res) {
            if (res.err) { st('cSt', 'err', 'Error: ' + res.err); return; }
            var msgs = [];
            try { msgs = JSON.parse(res.txt.replace(/```json/g,'').replace(/```/g,'').trim()); } catch(e) {}
            if (!msgs.length) { st('cSt', 'err', 'Could not read messages.'); return; }
            pushM(pid, msgs);
            st('cSt', 'ok', 'Imported ' + msgs.length + ' messages!');
            render();
        });
    };
    r.readAsDataURL(inp.files[0]);
}

function doQuo() {
    var pid = document.getElementById('sQuoP').value;
    if (!pid) { alert('Select a profile first.'); return; }
    var qk = localStorage.getItem('dlQK') || '';
    var qp = localStorage.getItem('dlQP') || '';
    if (!qk || !qp) { alert('Enter Quo settings first.'); return; }
    st('qSt', 'load', 'Syncing...');
    fetch('https://api.quo.com/v1/messages?phone=' + encodeURIComponent(qp), { headers: { 'Authorization': 'Bearer ' + qk } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var raw = data.messages || data.data || data || [];
        var out = [];
        var i;
        for (i = 0; i < raw.length; i++) {
            var m = raw[i];
            out.push({ sender: (m.direction === 'outbound' || m.from === qp) ? 'Me' : 'Her', text: m.body || m.text || '', date: m.created_at || m.date || '' });
        }
        if (!out.length) { st('qSt', 'err', 'No messages found.'); return; }
        pushM(pid, out);
        render();
        st('qSt', 'ok', 'Synced ' + out.length + ' messages!');
    })
    .catch(function(e) { st('qSt', 'err', 'Error: ' + e.message); });
}

function ai(key, b64, mime, prompt, cb) {
    fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: 1024,
            messages: [{
                role: 'user',
                content: [
                    { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
                    { type: 'text', text: prompt }
                ]
            }]
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.error) { cb({ err: d.error.message }); return; }
        cb({ txt: (d.content && d.content[0]) ? d.content[0].text : '' });
    })
    .catch(function(e) { cb({ err: e.message }); });
}

function addP() {
    var name = document.getElementById('iName').value.trim();
    if (!name) { alert('Name is required.'); return; }
    var pf = document.getElementById('pFile').files[0];
    function fin(photo) {
        profiles.push({
            id: Date.now(),
            name: name,
            age: document.getElementById('iAge').value || '',
            location: document.getElementById('iLoc').value.trim() || '',
            bio: document.getElementById('iBio').value.trim() || '',
            photo: photo || '',
            notes: '',
            messages: [],
            reminders: []
        });
        sp();
        document.getElementById('iName').value = '';
        document.getElementById('iAge').value = '';
        document.getElementById('iLoc').value = '';
        document.getElementById('iBio').value = '';
        document.getElementById('pFile').value = '';
        document.getElementById('picPrev').innerHTML = 'No photo';
        render();
        fillSel();
        alert('Profile added!');
    }
    if (pf) {
        var rd = new FileReader();
        rd.onload = function(e) { fin(e.target.result); };
        rd.readAsDataURL(pf);
    } else {
        fin('');
    }
}

function pushM(pid, msgs) {
    var i;
    for (i = 0; i < profiles.length; i++) {
        if (String(profiles[i].id) === String(pid)) {
            if (!profiles[i].messages) { profiles[i].messages = []; }
            var j;
            for (j = 0; j < msgs.length; j++) { profiles[i].messages.push(msgs[j]); }
            profiles[i].reminders = scanR(profiles[i].messages);
            break;
        }
    }
    sp();
}

function scanR(msgs) {
    var out = [];
    var seen = {};
    var i;
    for (i = 0; i < msgs.length; i++) {
        var t = msgs[i].text || '';
        var e2 = '';
        if (/birthday|bday/i.test(t)) { e2 = 'Birthday'; }
        else if (/trip|travel|flight|vacation/i.test(t)) { e2 = 'Trip'; }
        else if (/concert|dinner|tonight|tomorrow|next week/i.test(t)) { e2 = 'Event'; }
        if (e2) {
            var sn = t.length > 55 ? t.substring(0, 55) + '...' : t;
            if (!seen[sn]) { seen[sn] = true; out.push({ emoji: e2, text: sn }); }
        }
    }
    return out;
}

function saveN(pid) {
    var el = document.getElementById('nt' + pid);
    if (!el) { return; }
    var i;
    for (i = 0; i < profiles.length; i++) {
        if (String(profiles[i].id) === String(pid)) { profiles[i].notes = el.value; break; }
    }
    sp();
    alert('Saved!');
}

function delP(pid) {
    if (!confirm('Delete?')) { return; }
    var out = [];
    var i;
    for (i = 0; i < profiles.length; i++) {
        if (String(profiles[i].id) !== String(pid)) { out.push(profiles[i]); }
    }
    profiles = out;
    sp();
    render();
    fillSel();
}

function render() {
    var g = document.getElementById('grid');
    var em = document.getElementById('empty');
    g.innerHTML = '';
    if (!profiles.length) { em.style.display = 'block'; return; }
    em.style.display = 'none';
    var i;
    for (i = 0; i < profiles.length; i++) {
        var p = profiles[i];
        var d = document.createElement('div');
        d.className = 'pcard';
        var ph = '<div class="pphoto">' + (p.photo ? '<img src="' + p.photo + '">' : (p.name ? p.name.charAt(0) : '?')) + '</div>';
        var rem = '';
        if (p.reminders && p.reminders.length) {
            var r;
            for (r = 0; r < p.reminders.length; r++) {
                rem += '<span class="remtag">' + esc(p.reminders[r].emoji) + ' ' + esc(p.reminders[r].text) + '</span>';
            }
        }
        var mh = '';
        if (p.messages && p.messages.length) {
            mh = '<div style="font-size:11px;color:#777;margin:8px 0 4px;">CONVERSATION (' + p.messages.length + ')</div><div class="msglist">';
            var sl = p.messages.slice(-10);
            var m;
            for (m = 0; m < sl.length; m++) {
                mh += '<div class="msender">' + esc(sl[m].sender || '') + '</div><div class="mtext">' + esc(sl[m].text || '') + '</div>';
            }
            mh += '</div>';
        }
        d.innerHTML = ph + '<div class="pinfo">'
            + '<span class="pname">' + esc(p.name) + '</span>'
            + (p.age ? '<span class="page">' + esc(p.age) + '</span>' : '')
            + (p.location ? '<div class="ploc">' + esc(p.location) + '</div>' : '')
            + (p.bio ? '<div class="pbio">' + esc(p.bio) + '</div>' : '')
            + rem + mh
            + '<div style="font-size:11px;color:#777;margin:8px 0 4px;">NOTES</div>'
            + '<textarea class="notes" id="nt' + p.id + '" placeholder="Private notes...">' + esc(p.notes || '') + '</textarea>'

}

function saveSt() {
localStorage.setItem(‘dlAK’, document.getElementById(‘sAK’).value.trim());
localStorage.setItem(‘dlQK’, document.getElementById(‘sQK’).value.trim());
localStorage.setItem(‘dlQP’, document.getElementById(‘sQP’).value.trim());
alert(‘Saved!’);
}

function clearAll() {
if (!confirm(‘Delete everything?’)) { return; }
profiles = [];
localStorage.clear();
document.getElementById(‘sAK’).value = ‘’;
document.getElementById(‘sQK’).value = ‘’;
document.getElementById(‘sQP’).value = ‘’;
render();
fillSel();
alert(‘Cleared.’);
}

function fillSel() {
var ids = [‘sMsgP’, ‘sQuoP’];
var s;
for (s = 0; s < ids.length; s++) {
var el = document.getElementById(ids[s]);
if (!el) { continue; }
el.innerHTML = ‘<option value="">– Choose profile –</option>’;
var i;
for (i = 0; i < profiles.length; i++) {
var o = document.createElement(‘option’);
o.value = profiles[i].id;
o.textContent = profiles[i].name;
el.appendChild(o);
}
}
}

function st(id, cls, msg) {
var el = document.getElementById(id);
if (!el) { return; }
el.className = ’st ’ + cls;
el.innerHTML = msg;
}

function esc(s) {
if (!s) { return ‘’; }
return String(s).replace(/&/g, ‘&’).replace(/</g, ‘<’).replace(/>/g, ‘>’).replace(/”/g, ‘"’);
}

boot();
</script>

</body>
</html>
