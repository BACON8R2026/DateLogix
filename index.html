<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DateLogix</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: #2b001f; 
    color: white; 
    font-family: -apple-system, sans-serif; 
}
#header { 
    background: #ff00aa; 
    padding: 20px; 
    text-align: center; 
    font-size: 28px; 
    font-weight: bold; 
}
#page { padding: 16px; max-width: 480px; margin: 0 auto; }
.box { 
    background: #1e1e1e; 
    border: 2px solid #ff00aa; 
    border-radius: 12px; 
    padding: 18px; 
    margin-bottom: 20px; 
}
.lbl { 
    display: block; 
    font-size: 12px; 
    color: #ff99dd; 
    text-transform: uppercase; 
    margin: 12px 0 6px; 
}
input, textarea { 
    width: 100%; padding: 12px; background: #141414; border: 1px solid #ff00aa; 
    border-radius: 8px; color: white; font-size: 16px; 
}
textarea { min-height: 100px; }
input[type=file] { display: none; }
.upbtn, .btnred { 
    width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 10px; 
    font-size: 17px; font-weight: bold; cursor: pointer; 
}
.upbtn { background: #3a0028; border: 3px dashed #ff00aa; color: #ffbbff; }
.btnred { background: #ff00aa; color: white; }
.statusmsg { padding: 12px; border-radius: 8px; margin: 10px 0; text-align: center; display: none; }
.statusmsg.load { display: block; background: #3a0028; color: #ff99dd; }
.statusmsg.ok { display: block; background: #003300; color: #4caf50; }
.statusmsg.err { display: block; background: #330000; color: #ff6666; }

.pcard { 
    background: #1e1e1e; 
    border: 2px solid #ff00aa; 
    border-radius: 12px; 
    overflow: hidden; 
    margin-bottom: 20px; 
}
.pphoto { 
    width: 100%; 
    max-height: 520px; 
    background: #000; 
    overflow: hidden; 
}
.pphoto img { 
    width: 100%; 
    height: auto; 
    display: block; 
    object-fit: contain; 
}
.pinfo { padding: 16px; }
.pname { font-size: 24px; font-weight: bold; color: #ffbbff; }
</style>
</head>
<body>
<div id="header">DATELOGIX</div>
<div id="page">

<div class="box">
    <h2>API Key</h2>
    <span class="lbl">Anthropic API Key</span>
    <input type="password" id="sAK" placeholder="sk-ant-...">
    <button class="btnred" onclick="saveKey()">Save / Update Key</button>
    <div class="statusmsg" id="keyMsg"></div>
</div>

<div class="box">
    <h2>Add New Profile</h2>
    <span class="lbl">Select Screenshots (Profile + Messages)</span>
    <button class="upbtn" onclick="document.getElementById('ocrFiles').click()">Tap to select screenshots</button>
    <input type="file" id="ocrFiles" accept="image/*" multiple onchange="handleScreenshots(this)">
    <div class="thumbrow" id="thumbRow"></div>
    
    <button class="btnred" onclick="scanAll()">Scan All Screenshots</button>
    <div class="statusmsg" id="ocrMsg"></div>
    <hr>

    <span class="lbl">Main Profile Photo</span>
    <button class="upbtn" onclick="document.getElementById('pFile').click()">Choose / Replace Photo</button>
    <input type="file" id="pFile" accept="image/*" onchange="prevPic(this)">
    <div id="photoPreview" style="margin-top:10px;display:none;">
        <img id="previewImg" style="width:100%;max-height:380px;border-radius:10px;object-fit:contain;">
    </div>
    <hr>

    <span class="lbl">Name</span>
    <input type="text" id="iName" placeholder="Her name">
    <span class="lbl">Age</span>
    <input type="number" id="iAge" placeholder="Age">
    <span class="lbl">Location</span>
    <input type="text" id="iLoc" placeholder="City, State">
    <span class="lbl">Bio / Notes</span>
    <textarea id="iBio" placeholder="Bio and other details..."></textarea>

    <button class="btnred" onclick="addP()">Add Profile</button>
    <div class="statusmsg" id="addMsg"></div>
</div>

<div id="profilesArea"></div>
</div>

<script>
let profiles = [];
let currentPhotoData = '';

function boot() {
    const saved = localStorage.getItem('dlP');
    if (saved) profiles = JSON.parse(saved);
    render();
}

function saveKey() {
    const key = document.getElementById('sAK').value.trim();
    localStorage.setItem('dlAK', key);
    showMsg('keyMsg', 'ok', '✅ Key saved');
}

function prevPic(inp) {
    if (!inp.files[0]) return;
    const r = new FileReader();
    r.onload = e => {
        currentPhotoData = e.target.result;
        document.getElementById('previewImg').src = currentPhotoData;
        document.getElementById('photoPreview').style.display = 'block';
    };
    r.readAsDataURL(inp.files[0]);
}

function handleScreenshots(inp) {
    const row = document.getElementById('thumbRow');
    row.innerHTML = '';
    Array.from(inp.files).forEach(file => {
        const img = document.createElement('img');
        img.style = 'width:80px;height:80px;object-fit:cover;border-radius:8px;margin-right:8px;border:2px solid #ff00aa;';
        img.src = URL.createObjectURL(file);
        row.appendChild(img);
    });
}

function addP() {
    const name = document.getElementById('iName').value.trim();
    if (!name) return showMsg('addMsg', 'err', 'Name is required');

    profiles.unshift({
        id: Date.now(),
        name: name,
        age: document.getElementById('iAge').value || '',
        location: document.getElementById('iLoc').value || '',
        bio: document.getElementById('iBio').value || '',
        photo: currentPhotoData || ''
    });

    localStorage.setItem('dlP', JSON.stringify(profiles));
    resetForm();
    showMsg('addMsg', 'ok', '✅ Profile added!');
    render();
}

function resetForm() {
    document.getElementById('iName').value = '';
    document.getElementById('iAge').value = '';
    document.getElementById('iLoc').value = '';
    document.getElementById('iBio').value = '';
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('thumbRow').innerHTML = '';
}

function render() {
    const area = document.getElementById('profilesArea');
    area.innerHTML = '';

    if (profiles.length === 0) {
        area.innerHTML = '<div class="box" style="text-align:center;color:#ff99dd;padding:30px;">No profiles yet</div>';
        return;
    }

    profiles.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pcard';
        card.innerHTML = `
            <div class="pphoto">
                ${p.photo ? `<img src="${p.photo}">` : '<div style="height:260px;background:#333;text-align:center;line-height:260px;font-size:80px;">👤</div>'}
            </div>
            <div class="pinfo">
                <div class="pname">${p.name} ${p.age ? p.age : ''}</div>
                ${p.location ? `<div style="color:#ff99dd;margin:6px 0;">${p.location}</div>` : ''}
                ${p.bio ? `<div style="margin-top:8px;color:#ddd;line-height:1.4;">${p.bio}</div>` : ''}
            </div>
        `;
        area.appendChild(card);
    });
}

function showMsg(id, cls, msg) {
    const el = document.getElementById(id);
    if (el) {
        el.className = `statusmsg ${cls}`;
        el.innerHTML = msg;
        el.style.display = 'block';
    }
}

boot();
</script>
</body>
</html>
