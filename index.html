<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DateLogix</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #2b001f; color: white; font-family: -apple-system, sans-serif; }
#header { background: #ff00aa; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; }
#page { padding: 16px; max-width: 480px; margin: 0 auto; }
.box { background: #1e1e1e; border: 2px solid #ff00aa; border-radius: 12px; padding: 18px; margin-bottom: 20px; }
.box h2 { font-size: 16px; font-weight: bold; color: #ffbbff; margin-bottom: 10px; }
.lbl { display: block; font-size: 12px; color: #ff99dd; text-transform: uppercase; margin: 12px 0 6px; }
input[type=text], input[type=number], input[type=password], textarea { display: block; width: 100%; padding: 12px; background: #141414; border: 1px solid #ff00aa; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; font-family: -apple-system, sans-serif; }
textarea { min-height: 100px; }
input[type=file] { position: absolute; left: -9999px; top: -9999px; opacity: 0; width: 1px; height: 1px; }
.upbtn { display: block; width: 100%; padding: 16px; margin: 10px 0; border: 3px dashed #ff00aa; border-radius: 10px; background: #3a0028; color: #ffbbff; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; -webkit-appearance: none; font-family: -apple-system, sans-serif; }
.btnred { display: block; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 10px; background: #ff00aa; color: white; font-size: 17px; font-weight: bold; cursor: pointer; -webkit-appearance: none; font-family: -apple-system, sans-serif; }
.btnoff { display: block; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 10px; background: #333; color: #666; font-size: 17px; font-weight: bold; cursor: default; -webkit-appearance: none; font-family: -apple-system, sans-serif; }
.btndel { display: block; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 10px; background: #ff4444; color: white; font-size: 17px; font-weight: bold; cursor: pointer; -webkit-appearance: none; font-family: -apple-system, sans-serif; }
.statusmsg { padding: 12px; border-radius: 8px; margin: 10px 0; text-align: center; display: none; font-size: 14px; }
.statusmsg.load { display: block; background: #3a0028; color: #ff99dd; }
.statusmsg.ok { display: block; background: #003300; color: #4caf50; }
.statusmsg.err { display: block; background: #330000; color: #ff6666; }
.thumbrow { margin: 8px 0; min-height: 10px; }
.thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 8px; border: 2px solid #ff00aa; display: inline-block; vertical-align: top; }
.pcard { background: #1e1e1e; border: 2px solid #ff00aa; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.pphoto { width: 100%; background: #000; overflow: hidden; }
.pphoto img { width: 100%; height: 340px; display: block; object-fit: cover; object-position: 50% 15%; }
.pphoto-empty { width: 100%; height: 260px; background: #333; text-align: center; line-height: 260px; font-size: 80px; }
.pinfo { padding: 16px; }
.pname { font-size: 24px; font-weight: bold; color: #ffbbff; }
.page { font-size: 16px; color: #ff99dd; margin-left: 8px; }
.ploc { color: #ff99dd; margin: 6px 0; font-size: 14px; }
.pbio { margin-top: 8px; color: #ddd; line-height: 1.5; font-size: 14px; }
.ntarea { display: block; width: 100%; padding: 12px; background: #141414; border: 1px solid #ff00aa; border-radius: 8px; color: white; font-size: 14px; min-height: 80px; margin: 8px 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
hr { border: none; border-top: 1px solid #ff00aa44; margin: 16px 0; }
</style>
</head>
<body>
<div id="header">DATELOGIX</div>
<div id="page">

<div class="box">
<h2>API Key</h2>
<span class="lbl">Anthropic API Key</span>
<input type="password" id="sAK" placeholder="sk-ant-...">
<button class="btnred" onclick="saveKey()">Save Key</button>
<div class="statusmsg" id="keyMsg"></div>
</div>

<div class="box">
<h2>Add New Profile</h2>
<span class="lbl">Upload Tinder Screenshots</span>
<p style="color:#ff99dd;font-size:12px;margin-bottom:8px;">Tap below and select 1-5 screenshots. All will be scanned and combined.</p>
<button class="upbtn" onclick="document.getElementById('ocrFiles').click()">Tap to select screenshots</button>
<input type="file" id="ocrFiles" accept="image/*" multiple onchange="handleScreenshots(this)">
<div class="thumbrow" id="thumbRow"></div>
<button class="btnred" onclick="scanAll()">Scan All Screenshots</button>
<div class="statusmsg" id="ocrMsg"></div>
<hr>
<span class="lbl">Main Profile Photo</span>
<p style="color:#ff99dd;font-size:12px;margin-bottom:8px;">First screenshot is used automatically. Tap below to choose a different one.</p>
<button class="upbtn" onclick="document.getElementById('pFile').click()">Choose / Replace Photo</button>
<input type="file" id="pFile" accept="image/*" onchange="prevPic(this)">
<div id="photoPreview" style="margin-top:10px;display:none;">
<img id="previewImg" style="width:100%;height:300px;border-radius:10px;object-fit:cover;object-position:50% 15%;display:block;">
</div>
<hr>
<span class="lbl">Name</span>
<input type="text" id="iName" placeholder="Her name">
<span class="lbl">Age</span>
<input type="number" id="iAge" placeholder="Age">
<span class="lbl">Location</span>
<input type="text" id="iLoc" placeholder="City, State">
<span class="lbl">Bio / Notes</span>
<textarea id="iBio" placeholder="Bio and other details..."></textarea>
<button class="btnred" onclick="addP()">Add Profile</button>
<div class="statusmsg" id="addMsg"></div>
</div>

<div id="profilesArea"></div>
</div>

<script>
var profiles = [];
var currentPhotoData = '';
var selectedFiles = [];

function boot() {
    var s = localStorage.getItem('dlP');
    if (s) { try { profiles = JSON.parse(s); } catch(e) { profiles = []; } }
    var k = localStorage.getItem('dlAK') || '';
    document.getElementById('sAK').value = k;
    render();
}

function sp() { localStorage.setItem('dlP', JSON.stringify(profiles)); }

function saveKey() {
    var k = document.getElementById('sAK').value.trim();
    if (!k) { showMsg('keyMsg', 'err', 'Please enter your API key.'); return; }
    localStorage.setItem('dlAK', k);
    showMsg('keyMsg', 'ok', 'Key saved!');
}

function prevPic(inp) {
    if (!inp || !inp.files || !inp.files[0]) return;
    var r = new FileReader();
    r.onload = function(e) {
        currentPhotoData = e.target.result;
        document.getElementById('previewImg').src = currentPhotoData;
        document.getElementById('photoPreview').style.display = 'block';
    };
    r.readAsDataURL(inp.files[0]);
}

function handleScreenshots(inp) {
    if (!inp.files || !inp.files.length) return;
    selectedFiles = [];
    var row = document.getElementById('thumbRow');
    row.innerHTML = '';
    var count = inp.files.length > 5 ? 5 : inp.files.length;
    var i;
    for (i = 0; i < count; i++) {
        selectedFiles.push(inp.files[i]);
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = document.createElement('img');
            img.className = 'thumb';
            img.src = e.target.result;
            row.appendChild(img);
            if (!currentPhotoData) {
                currentPhotoData = e.target.result;
                document.getElementById('previewImg').src = currentPhotoData;
                document.getElementById('photoPreview').style.display = 'block';
            }
        };
        reader.readAsDataURL(inp.files[i]);
    }
    showMsg('ocrMsg', 'ok', count + ' screenshot(s) selected. Tap Scan All Screenshots.');
}

function scanAll() {
    var key = localStorage.getItem('dlAK') || '';
    if (!key) { showMsg('ocrMsg', 'err', 'Save your API key first.'); return; }
    if (!selectedFiles.length) { showMsg('ocrMsg', 'err', 'Select screenshots first.'); return; }
    showMsg('ocrMsg', 'load', 'Scanning ' + selectedFiles.length + ' screenshot(s)...');
    var results = [];
    var done = 0;
    var total = selectedFiles.length;

    function scanOne(file) {
        var r = new FileReader();
        r.onload = function(e) {
            var b64 = e.target.result.split(',')[1];
            var mime = file.type || 'image/jpeg';
            var prompt = 'This is a Tinder profile screenshot. Extract all visible text. Return ONLY raw JSON: {"name":"","age":"","location":"","bio":"","extra":""}. Put job, school, interests in extra field.';
            callAI(key, b64, mime, prompt, function(res) {
                if (!res.err && res.txt) {
                    try {
                        var d = JSON.parse(res.txt.replace(/```json/g, '').replace(/```/g, '').trim());
                        results.push(d);
                    } catch(ex) {}
                }
                done++;
                if (done === total) { mergeResults(results); }
            });
        };
        r.readAsDataURL(file);
    }

    var i;
    for (i = 0; i < selectedFiles.length; i++) { scanOne(selectedFiles[i]); }
}

function mergeResults(results) {
    if (!results.length) { showMsg('ocrMsg', 'err', 'Could not read screenshots. Try again.'); return; }
    var name = '';
    var age = '';
    var location = '';
    var bioparts = [];
    var i;
    for (i = 0; i < results.length; i++) {
        var d = results[i];
        if (!name && d.name) name = d.name;
        if (!age && d.age) age = String(d.age);
        if (!location && d.location) location = d.location;
        if (d.bio && d.bio.trim()) bioparts.push(d.bio.trim());
        if (d.extra && d.extra.trim()) bioparts.push(d.extra.trim());
    }
    if (name) document.getElementById('iName').value = name;
    if (age) document.getElementById('iAge').value = age;
    if (location) document.getElementById('iLoc').value = location;
    if (bioparts.length) document.getElementById('iBio').value = bioparts.join(' ').trim();
    showMsg('ocrMsg', 'ok', 'Scanned ' + results.length + ' screenshot(s). Review fields then tap Add Profile.');
}

function callAI(key, b64, mime, prompt, cb) {
    fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: 1024,
            messages: [{
                role: 'user',
                content: [
                    { type: 'image', source: { type: 'base64', media_type: mime, data: b64 } },
                    { type: 'text', text: prompt }
                ]
            }]
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.error) { cb({ err: d.error.message }); return; }
        cb({ txt: (d.content && d.content[0]) ? d.content[0].text : '' });
    })
    .catch(function(e) { cb({ err: e.message }); });
}

function addP() {
    var name = document.getElementById('iName').value.trim();
    if (!name) { showMsg('addMsg', 'err', 'Name is required.'); return; }
    var newId = Date.now();
    profiles.unshift({
        id: newId,
        name: name,
        age: document.getElementById('iAge').value || '',
        location: document.getElementById('iLoc').value.trim() || '',
        bio: document.getElementById('iBio').value.trim() || '',
        photo: currentPhotoData || '',
        notes: ''
    });
    sp();
    document.getElementById('iName').value = '';
    document.getElementById('iAge').value = '';
    document.getElementById('iLoc').value = '';
    document.getElementById('iBio').value = '';
    document.getElementById('pFile').value = '';
    document.getElementById('ocrFiles').value = '';
    document.getElementById('thumbRow').innerHTML = '';
    document.getElementById('photoPreview').style.display = 'none';
    selectedFiles = [];
    currentPhotoData = '';
    showMsg('addMsg', 'ok', 'Profile added!');
    render();
}

function saveN(pid) {
    var el = document.getElementById('nt' + pid);
    if (!el) return;
    var i;
    for (i = 0; i < profiles.length; i++) {
        if (String(profiles[i].id) === String(pid)) {
            profiles[i].notes = el.value;
            break;
        }
    }
    sp();
    alert('Notes saved!');
}

function delP(pid) {
    if (!confirm('Delete this profile?')) return;
    var out = [];
    var i;
    for (i = 0; i < profiles.length; i++) {
        if (String(profiles[i].id) !== String(pid)) {
            out.push(profiles[i]);
        }
    }
    profiles = out;
    sp();
    render();
}

function render() {
    var area = document.getElementById('profilesArea');
    area.innerHTML = '';

    if (!profiles.length) {
        var empty = document.createElement('div');
        empty.className = 'box';
        empty.style.textAlign = 'center';
        empty.style.color = '#ff99dd';
        empty.style.padding = '30px';
        empty.innerHTML = 'No profiles yet. Add your first one above.';
        area.appendChild(empty);
        return;
    }

    var i;
    for (i = 0; i < profiles.length; i++) {
        var p = profiles[i];
        var pid = p.id;

        var card = document.createElement('div');
        card.className = 'pcard';

        var photoDiv = document.createElement('div');
        photoDiv.className = 'pphoto';
        if (p.photo) {
            var img = document.createElement('img');
            img.src = p.photo;
            photoDiv.appendChild(img);
        } else {
            photoDiv.className = 'pphoto-empty';
            photoDiv.innerHTML = p.name ? p.name.charAt(0) : '?';
        }
        card.appendChild(photoDiv);

        var info = document.createElement('div');
        info.className = 'pinfo';

        var topLine = document.createElement('div');
        var nameEl = document.createElement('span');
        nameEl.className = 'pname';
        nameEl.innerHTML = esc(p.name);
        topLine.appendChild(nameEl);
        if (p.age) {
            var ageEl = document.createElement('span');
            ageEl.className = 'page';
            ageEl.innerHTML = esc(p.age);
            topLine.appendChild(ageEl);
        }
        info.appendChild(topLine);

        if (p.location) {
            var locEl = document.createElement('div');
            locEl.className = 'ploc';
            locEl.innerHTML = esc(p.location);
            info.appendChild(locEl);
        }

        if (p.bio) {
            var bioEl = document.createElement('div');
            bioEl.className = 'pbio';
            bioEl.innerHTML = esc(p.bio);
            info.appendChild(bioEl);
        }

        var nlbl = document.createElement('div');
        nlbl.style.cssText = 'font-size:11px;color:#ff99dd;text-transform:uppercase;margin:12px 0 4px;';
        nlbl.innerHTML = 'Notes';
        info.appendChild(nlbl);

        var ta = document.createElement('textarea');
        ta.className = 'ntarea';
        ta.id = 'nt' + pid;
        ta.placeholder = 'Private notes...';
        ta.value = p.notes || '';
        info.appendChild(ta);

        var saveBtn = document.createElement('button');
        saveBtn.className = 'btnred';
        saveBtn.innerHTML = 'Save Notes';
        saveBtn.onclick = (function(id) { return function() { saveN(id); }; })(pid);
        info.appendChild(saveBtn);

        var delBtn = document.createElement('button');
        delBtn.className = 'btndel';
        delBtn.innerHTML = 'Delete Profile';
        delBtn.onclick = (function(id) { return function() { delP(id); }; })(pid);
        info.appendChild(delBtn);

        card.appendChild(info);
        area.appendChild(card);
    }
}

function showMsg(id, cls, msg) {
    var el = document.getElementById(id);
    if (!el) return;
    el.className = 'statusmsg ' + cls;
    el.innerHTML = msg;
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

boot();
</script>

</body>
</html>
