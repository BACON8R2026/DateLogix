<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DateLogix</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: white; }
#header { background: #8B0000; padding: 14px; text-align: center; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
#page { padding: 14px; max-width: 480px; margin: 0 auto; }
.box { background: #1e1e1e; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.box h2 { font-size: 15px; font-weight: bold; margin-bottom: 12px; color: #ccc; }
.lbl { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; margin-top: 10px; }
input[type=text], input[type=number], input[type=password], textarea { 
    display: block; width: 100%; padding: 10px; background: #141414; border: 1px solid #444; 
    border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; 
}
textarea { min-height: 80px; resize: vertical; }
input[type=file] { position: absolute; left: -9999px; top: -9999px; opacity: 0; width: 1px; height: 1px; }
.upbtn { 
    display: block; width: 100%; padding: 16px; border: 2px dashed #8B0000; border-radius: 8px; 
    background: #1a0000; color: #aaa; font-size: 14px; text-align: center; cursor: pointer; 
    margin: 10px 0; 
}
.btnred { 
    display: block; width: 100%; padding: 13px; margin-top: 12px; background: #8B0000; color: white; 
    border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; 
}
.btnoff { 
    display: block; width: 100%; padding: 13px; margin-top: 12px; background: #333; color: #666; 
    border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: default; 
}
.btndel { 
    display: block; width: 100%; padding: 13px; margin-top: 8px; background: #ff4444; color: white; 
    border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; 
}
.btnhide { 
    display: block; width: 100%; padding: 13px; margin-top: 8px; background: #555; color: white; 
    border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; 
}
.statusmsg { padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; text-align: center; display: none; }
.statusmsg.load { display: block; background: #2a1a00; color: orange; }
.statusmsg.ok { display: block; background: #003300; color: #4caf50; }
.statusmsg.err { display: block; background: #330000; color: #ff5555; }
.pcard { background: #1e1e1e; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
.pphoto { width: 100%; max-height: 420px; overflow: hidden; background: #2a2a2a; position: relative; }
.pphoto img { width: 100%; height: auto; display: block; object-fit: contain; background: #000; }
.pphoto-empty { width: 100%; height: 300px; background: #2a2a2a; text-align: center; line-height: 300px; font-size: 60px; color: #555; }
.pinfo { padding: 14px; }
.pname { font-size: 22px; font-weight: bold; }
.page { font-size: 14px; color: #aaa; margin-left: 6px; }
.ploc { color: #777; font-size: 13px; margin: 6px 0; }
.pbio { color: #bbb; font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
.convo-summary { background: #252525; padding: 10px; border-radius: 8px; font-size: 13px; margin: 8px 0; white-space: pre-wrap; }
.ntarea { 
    display: block; width: 100%; padding: 10px; background: #141414; border: 1px solid #333; 
    border-radius: 8px; color: white; font-size: 13px; min-height: 100px; margin: 8px 0; 
}
.thumbrow { margin: 8px 0; overflow-x: auto; white-space: nowrap; padding-bottom: 4px; }
.thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; margin-right: 6px; border: 2px solid #555; display: inline-block; }
.hidden { display: none !important; }
hr { border: none; border-top: 1px solid #333; margin: 14px 0; }
</style>
</head>
<body>
<div id="header">DATELOGIX</div>
<div id="page">

<div class="box">
    <h2>API Key</h2>
    <span class="lbl">Anthropic API Key</span>
    <input type="password" id="sAK" placeholder="sk-ant-...">
    <button id="saveBtn" class="btnred" onclick="saveKey()">Save Key</button>
    <div class="statusmsg" id="keyMsg"></div>
</div>

<div class="box">
    <h2>Add / Update Profile</h2>
    
    <span class="lbl">Tinder Profile + Chat Screenshots (multiple OK)</span>
    <p style="color:#666;font-size:12px;margin-bottom:8px;">Select all screenshots at once (profile + chats). They will be scanned together.</p>
    <button class="upbtn" onclick="document.getElementById('ocrFiles').click()">Tap to select screenshots</button>
    <input type="file" id="ocrFiles" accept="image/*" multiple onchange="handleScreenshots(this)">
    <div class="thumbrow" id="thumbRow"></div>
    <button class="btnred" onclick="scanAll()">Scan All Screenshots</button>
    <div class="statusmsg" id="ocrMsg"></div>
    <hr>

    <span class="lbl">Main Profile Photo</span>
    <button class="upbtn" onclick="document.getElementById('pFile').click()">Choose / Replace Photo</button>
    <input type="file" id="pFile" accept="image/*" onchange="prevPic(this)">
    <div id="photoPreview" style="margin-top:8px;display:none;">
        <img id="previewImg" style="width:100%;max-height:300px;object-fit:contain;border-radius:8px;">
    </div>
    <hr>

    <span class="lbl">Name</span>
    <input type="text" id="iName" placeholder="Her name">
    <span class="lbl">Age</span>
    <input type="number" id="iAge" placeholder="Age">
    <span class="lbl">Location</span>
    <input type="text" id="iLoc" placeholder="City, State">
    <span class="lbl">Bio / Info</span>
    <textarea id="iBio" placeholder="Bio and other details..."></textarea>
    
    <button class="btnred" onclick="addP()">Add / Save Profile</button>
    <div class="statusmsg" id="addMsg"></div>
</div>

<div id="profilesArea"></div>
</div>

<script>
let profiles = [];
let currentPhotoData = '';
let selectedFiles = [];
let editingId = null;

function boot() {
    const saved = localStorage.getItem('dlP');
    if (saved) {
        try { profiles = JSON.parse(saved); } catch(e) { profiles = []; }
    }
    const k = localStorage.getItem('dlAK') || '';
    document.getElementById('sAK').value = k;
    if (k) markKeySaved();
    render();
}

function saveProfiles() {
    localStorage.setItem('dlP', JSON.stringify(profiles));
}

function markKeySaved() {
    const btn = document.getElementById('saveBtn');
    btn.className = 'btnoff';
    btn.textContent = 'Key Saved ✓';
}

function saveKey() {
    const k = document.getElementById('sAK').value.trim();
    if (!k) return showMsg('keyMsg', 'err', 'Enter your API key');
    localStorage.setItem('dlAK', k);
    showMsg('keyMsg', 'ok', 'Key saved');
    markKeySaved();
}

function handleScreenshots(inp) {
    if (!inp.files?.length) return;
    selectedFiles = Array.from(inp.files).slice(0, 8);
    const thumbRow = document.getElementById('thumbRow');
    thumbRow.innerHTML = '';
    
    selectedFiles.forEach((file, idx) => {
        const r = new FileReader();
        r.onload = e => {
            const img = document.createElement('img');
            img.className = 'thumb';
            img.src = e.target.result;
            thumbRow.appendChild(img);
            if (idx === 0 && !currentPhotoData) currentPhotoData = e.target.result;
        };
        r.readAsDataURL(file);
    });
    
    showMsg('ocrMsg', 'ok', `${selectedFiles.length} file(s) selected. Tap "Scan All Screenshots"`);
}

function prevPic(inp) {
    if (!inp.files?.[0]) return;
    const r = new FileReader();
    r.onload = e => {
        currentPhotoData = e.target.result;
        const prev = document.getElementById('photoPreview');
        document.getElementById('previewImg').src = currentPhotoData;
        prev.style.display = 'block';
        showMsg('addMsg', 'ok', 'Photo updated');
    };
    r.readAsDataURL(inp.files[0]);
}

async function scanAll() {
    const key = localStorage.getItem('dlAK') || '';
    if (!key) return showMsg('ocrMsg', 'err', 'Save API key first');
    if (!selectedFiles.length) return showMsg('ocrMsg', 'err', 'Select screenshots first');

    showMsg('ocrMsg', 'load', `Scanning ${selectedFiles.length} screenshot(s)...`);

    const results = [];
    for (let file of selectedFiles) {
        try {
            const base64 = await fileToBase64(file);
            const b64 = base64.split(',')[1];
            const mime = file.type || 'image/jpeg';
            
            const prompt = `Analyze this screenshot. It could be a Tinder profile or text message conversation.
Extract:
- name, age, location, bio if it's a profile
- full conversation text if it's messages (keep chronological order)
Return ONLY valid JSON:
{
  "name": "",
  "age": "",
  "location": "",
  "bio": "",
  "conversation": "full chat text here if present",
  "extra": ""
}`;

            const res = await callAI(key, b64, mime, prompt);
            if (res.txt) {
                try {
                    let clean = res.txt.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsed = JSON.parse(clean);
                    results.push(parsed);
                } catch(e) {}
            }
        } catch(e) {}
    }

    mergeResults(results);
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
    });
}

function mergeResults(results) {
    if (!results.length) {
        showMsg('ocrMsg', 'err', 'No data extracted. Try clearer screenshots.');
        return;
    }

    let name = '', age = '', location = '', bio = '', convo = '';

    results.forEach(d => {
        if (d.name && !name) name = d.name;
        if (d.age && !age) age = d.age;
        if (d.location && !location) location = d.location;
        if (d.bio) bio += ' ' + d.bio;
        if (d.conversation) convo += '\n\n' + d.conversation;
    });

    bio = bio.trim();
    convo = convo.trim();

    if (name) document.getElementById('iName').value = name;
    if (age) document.getElementById('iAge').value = age;
    if (location) document.getElementById('iLoc').value = location;
    if (bio) document.getElementById('iBio').value = bio;

    // Store conversation temporarily on the profile when adding
    window.tempConvo = convo || '';

    showMsg('ocrMsg', 'ok', `Scanned ${results.length} screenshot(s). Review & tap Add Profile.`);
}

async function callAI(key, b64, mime, prompt) {
    try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: "claude-3-5-sonnet-20240620",  // More reliable model name
                max_tokens: 1500,
                messages: [{
                    role: "user",
                    content: [
                        { type: "image", source: { type: "base64", media_type: mime, data: b64 } },
                        { type: "text", text: prompt }
                    ]
                }]
            })
        });

        const data = await resp.json();
        if (data.error) throw new Error(data.error.message);
        return { txt: data.content?.[0]?.text || '' };
    } catch(e) {
        console.error(e);
        showMsg('ocrMsg', 'err', 'API error: ' + e.message);
        return { err: e.message };
    }
}

function addP() {
    const name = document.getElementById('iName').value.trim();
    if (!name) return showMsg('addMsg', 'err', 'Name required');

    const newProfile = {
        id: editingId || Date.now(),
        name: name,
        age: document.getElementById('iAge').value || '',
        location: document.getElementById('iLoc').value.trim() || '',
        bio: document.getElementById('iBio').value.trim() || '',
        photo: currentPhotoData || '',
        notes: '',
        conversations: window.tempConvo || '',
        hidden: false,
        created: Date.now()
    };

    if (editingId) {
        const idx = profiles.findIndex(p => p.id === editingId);
        if (idx > -1) profiles[idx] = newProfile;
    } else {
        profiles.unshift(newProfile); // newest first
    }

    saveProfiles();
    resetForm();
    showMsg('addMsg', 'ok', editingId ? 'Profile updated!' : 'Profile added!');
    render();
}

function resetForm() {
    editingId = null;
    document.getElementById('iName').value = '';
    document.getElementById('iAge').value = '';
    document.getElementById('iLoc').value = '';
    document.getElementById('iBio').value = '';
    document.getElementById('pFile').value = '';
    document.getElementById('ocrFiles').value = '';
    document.getElementById('thumbRow').innerHTML = '';
    document.getElementById('photoPreview').style.display = 'none';
    selectedFiles = [];
    currentPhotoData = '';
    window.tempConvo = '';
}

function saveNotes(pid) {
    const el = document.getElementById('nt' + pid);
    if (!el) return;
    const p = profiles.find(x => x.id === pid);
    if (p) p.notes = el.value;
    saveProfiles();
    showMsg('addMsg', 'ok', 'Notes saved');
}

function deleteProfile(pid) {
    if (!confirm('Delete this profile permanently?')) return;
    profiles = profiles.filter(p => p.id !== pid);
    saveProfiles();
    render();
}

function toggleHide(pid) {
    const p = profiles.find(x => x.id === pid);
    if (p) {
        p.hidden = !p.hidden;
        saveProfiles();
        render();
    }
}

function render() {
    const area = document.getElementById('profilesArea');
    area.innerHTML = '';

    const visible = profiles.filter(p => !p.hidden);
    const hiddenCount = profiles.length - visible.length;

    if (!profiles.length) {
        area.innerHTML = `
            <div class="pcard">
                <div class="pphoto-empty">👩</div>
                <div class="pinfo">
                    <span class="pname">No profiles yet</span>
                    <div class="pbio">Add your first profile above</div>
                </div>
            </div>`;
        return;
    }

    visible.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pcard';

        // Photo
        const photoDiv = document.createElement('div');
        photoDiv.className = 'pphoto';
        if (p.photo) {
            const img = document.createElement('img');
            img.src = p.photo;
            photoDiv.appendChild(img);
        } else {
            photoDiv.className = 'pphoto-empty';
            photoDiv.textContent = p.name?.[0] || '?';
        }
        card.appendChild(photoDiv);

        const info = document.createElement('div');
        info.className = 'pinfo';

        info.innerHTML = `
            <span class="pname">${escapeHtml(p.name)}</span>
            ${p.age ? `<span class="page">${p.age}</span>` : ''}
            ${p.location ? `<div class="ploc">${escapeHtml(p.location)}</div>` : ''}
            ${p.bio ? `<div class="pbio">${escapeHtml(p.bio)}</div>` : ''}
        `;

        // Conversation summary
        if (p.conversations) {
            const sumDiv = document.createElement('div');
            sumDiv.className = 'convo-summary';
            sumDiv.innerHTML = `<strong>Chat Summary:</strong><br>${escapeHtml(p.conversations.substring(0, 280))}${p.conversations.length > 280 ? '...' : ''}`;
            info.appendChild(sumDiv);
        }

        // Notes
        const notesLabel = document.createElement('div');
        notesLabel.style.cssText = 'font-size:11px;color:#777;text-transform:uppercase;margin:12px 0 4px;';
        notesLabel.textContent = 'Private Notes';
        info.appendChild(notesLabel);

        const ta = document.createElement('textarea');
        ta.className = 'ntarea';
        ta.id = 'nt' + p.id;
        ta.value = p.notes || '';
        ta.placeholder = 'Meeting notes, red flags, plans...';
        info.appendChild(ta);

        // Buttons
        const saveBtn = document.createElement('button');
        saveBtn.className = 'btnred';
        saveBtn.textContent = 'Save Notes';
        saveBtn.onclick = () => saveNotes(p.id);
        info.appendChild(saveBtn);

        const hideBtn = document.createElement('button');
        hideBtn.className = 'btnhide';
        hideBtn.textContent = p.hidden ? 'Unhide' : 'Hide / Archive';
        hideBtn.onclick = () => toggleHide(p.id);
        info.appendChild(hideBtn);

        const delBtn = document.createElement('button');
        delBtn.className = 'btndel';
        delBtn.textContent = 'Delete';
        delBtn.onclick = () => deleteProfile(p.id);
        info.appendChild(delBtn);

        card.appendChild(info);
        area.appendChild(card);
    });

    if (hiddenCount > 0) {
        const note = document.createElement('div');
        note.style.cssText = 'text-align:center; color:#666; font-size:13px; margin:20px 0;';
        note.textContent = `${hiddenCount} hidden/archived profile(s)`;
        area.appendChild(note);
    }
}

function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function showMsg(id, cls, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `statusmsg ${cls}`;
    el.innerHTML = msg;
}

// Initialize
boot();
</script>
</body>
</html>
